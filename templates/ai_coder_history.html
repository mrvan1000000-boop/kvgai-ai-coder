{% extends "layout.html" %}
{% block content %}
<div class="card">
  <div class="card-title"><i class="fas fa-clock-rotate-left"></i> История запросов</div>
  {% for item in items %}
    <a href="/admin/ai-coder/history/item/{{ item.id }}" class="history-item">
      <span class="date">{{ item.created_at }}</span>
      <span class="task-preview">{{ item.task[:80] }}...</span>
    </a>
  {% endfor %}
</div>
{% endblock %}
