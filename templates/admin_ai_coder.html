<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AI-Coder помощник</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* Базовая стилизация страницы */
body {
  margin: 0;
  padding: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
    "Segoe UI", sans-serif;
  background: radial-gradient(circle at top left, #111827 0, #020617 45%, #000 100%);
  color: #e5e7eb;
}

/* Центровка и контейнер */
.page-wrapper {
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 16px;
}

.card {
  width: 100%;
  max-width: 960px;
  background: rgba(15, 23, 42, 0.92);
  border-radius: 18px;
  border: 1px solid rgba(148, 163, 184, 0.35);
  box-shadow:
    0 24px 60px rgba(15, 23, 42, 0.9),
    0 0 0 1px rgba(15, 23, 42, 0.9);
  padding: 24px 28px 28px;
  backdrop-filter: blur(18px);
}

/* Заголовок и описание */
.card-header {
  margin-bottom: 20px;
}

.card-title {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: 0.03em;
  color: #f9fafb;
  display: flex;
  align-items: center;
  gap: 10px;
}

.card-title span.badge {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  padding: 3px 8px;
  border-radius: 999px;
  border: 1px solid rgba(96, 165, 250, 0.6);
  color: #93c5fd;
  background: rgba(15, 23, 42, 0.9);
}

.card-subtitle {
  margin-top: 6px;
  font-size: 13px;
  color: #9ca3af;
}

/* Формы */
.form-section {
  display: grid;
  grid-template-columns: minmax(0, 2fr) minmax(0, 1.4fr);
  gap: 20px;
  margin-top: 18px;
}

.form-group {
  margin-bottom: 14px;
}

.form-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #9ca3af;
  margin-bottom: 6px;
  display: block;
}

.form-helper {
  font-size: 12px;
  color: #6b7280;
  margin-bottom: 6px;
}

/* Поле задачи */
textarea,
input[type="text"] {
  width: 100%;
  border-radius: 10px;
  border: 1px solid rgba(55, 65, 81, 0.9);
  background: rgba(15, 23, 42, 0.9);
  color: #e5e7eb;
  padding: 10px 11px;
  font-size: 13px;
  outline: none;
  resize: vertical;
  min-height: 90px;
  transition: border-color 0.15s ease, box-shadow 0.15s ease,
    background-color 0.15s ease;
}

textarea:focus,
input[type="text"]:focus {
  border-color: #60a5fa;
  box-shadow: 0 0 0 1px rgba(96, 165, 250, 0.6);
  background: rgba(15, 23, 42, 0.96);
}

/* Файлы */
input[type="file"] {
  width: 100%;
  font-size: 12px;
  color: #9ca3af;
}

.file-row {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* Кнопка отправки */
.button-row {
  margin-top: 10px;
}

button[type="submit"] {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 9px 16px;
  border-radius: 999px;
  border: 1px solid rgba(96, 165, 250, 0.7);
  background: linear-gradient(135deg, #1d4ed8, #4f46e5);
  color: #f9fafb;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  outline: none;
  transition: transform 0.08s ease, box-shadow 0.12s ease,
    filter 0.12s ease;
}

button[type="submit"]:hover {
  filter: brightness(1.05);
  box-shadow: 0 14px 30px rgba(37, 99, 235, 0.45);
  transform: translateY(-0.5px);
}

button[type="submit"]:active {
  transform: translateY(0.5px);
  box-shadow: 0 8px 18px rgba(37, 99, 235, 0.35);
}

/* Блок результата */
.result-section {
  margin-top: 22px;
  border-top: 1px solid rgba(31, 41, 55, 0.9);
  padding-top: 18px;
}

.result-title {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #9ca3af;
  margin-bottom: 8px;
}

.result-box {
  border-radius: 12px;
  border: 1px solid rgba(55, 65, 81, 0.9);
  background: radial-gradient(circle at top left, #020617 0, #0b1120 40%, #020617 100%);
  padding: 12px 13px;
  font-size: 13px;
  color: #e5e7eb;
  white-space: pre-wrap;
}

/* Подсветка ошибок */
.result-box.error {
  border-color: rgba(248, 113, 113, 0.9);
  background: radial-gradient(circle at top left, #450a0a 0, #111827 45%, #020617 100%);
  color: #fecaca;
}

/* Адаптив */
@media (max-width: 768px) {
  .card {
    padding: 18px 16px 20px;
  }

  .form-section {
    grid-template-columns: minmax(0, 1fr);
  }
}
</style>
</head>

<body>
<div class="page-wrapper">
  <div class="card">

    <div class="card-header">
      <div class="card-title">
        AI‑Coder помощник
        <span class="badge">beta</span>
      </div>
      <div class="card-subtitle">
        Загрузи файл или ZIP проекта, опиши задачу — нейросеть поможет с кодом.
      </div>
    </div>

    <form method="post" enctype="multipart/form-data">

      <div class="form-section">

        <!-- Левая колонка -->
        <div>
          <div class="form-group">
            <label class="form-label">Задача</label>
            <textarea name="task" placeholder="Например: найди ошибки в коде, оптимизируй функцию, перепиши модуль...">{{ task }}</textarea>
          </div>
        </div>

        <!-- Правая колонка -->
        <div class="file-row">
          <div class="form-group">
            <label class="form-label">Файл кода</label>
            <input type="file" name="file">
          </div>

          <div class="form-group">
            <label class="form-label">ZIP проекта</label>
            <input type="file" name="zip">
          </div>
        </div>

      </div>

      <div class="button-row">
        <button type="submit">Отправить</button>
      </div>

    </form>

    <div class="result-section">
      <div class="result-title">Результат</div>

      {% if result %}
      <div class="result-box {% if 'Ошибка' in result %}error{% endif %}">
        {{ result }}
      </div>
      {% endif %}

      {% if download %}
      <div style="margin-top: 10px;">
        <a href="{{ download }}" style="color:#93c5fd;">Скачать результат</a>
      </div>
      {% endif %}
    </div>

  </div>
</div>
</body>
</html>
