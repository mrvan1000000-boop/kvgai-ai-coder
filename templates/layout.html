<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>KVG AI Studio — AI‑Coder</title>
    <link rel="stylesheet" href="/static/ai_coder.css">
</head>
<body class="app">
<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">KVG AI Studio</div>
            <div class="subtitle">AI‑Coder</div>
        </div>

        <nav class="sidebar-nav">
            <a href="/admin/ai-coder?user_id={{ user_id }}" class="nav-item">Диалог</a>
            <a href="/admin/ai-coder/history/{{ user_id }}" class="nav-item">История задач</a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-pill">
                <div class="user-avatar">AI</div>
                <div class="user-meta">
                    <div class="user-name">Пользователь</div>
                    <div class="user-id">{{ user_id }}</div>
                </div>
            </div>
        </div>
    </aside>

    <main class="main">
        {% block content %}{% endblock %}
    </main>
</div>

<script>
    // сохраняем user_id в localStorage, чтобы не забывать пользователя
    (function() {
        const uid = "{{ user_id }}";
        if (uid && uid !== "None") {
            localStorage.setItem("kvg_ai_user_id", uid);
        }
    })();
</script>
</body>
</html>
