<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KVG AI Studio — AI‑Coder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
    <link rel="stylesheet" href="/static/ai_coder.css">
</head>
<body class="app">
<div class="app-shell">
    <aside class="sidebar">
        <div class="logo-block">
            <div class="logo">KVG AI Studio</div>
            <div class="subtitle"><i class="fas fa-code"></i> AI‑Coder</div>
        </div>
        <nav class="sidebar-nav">
            <a href="/admin/ai-coder?user_id={{ user_id or '' }}" class="nav-item {% if request.url.path == '/admin/ai-coder' %}active{% endif %}">
                <i class="fas fa-comment-dots"></i> Диалог
            </a>
            <a href="/admin/ai-coder/history/{{ user_id or '' }}" class="nav-item {% if request.url.path.startswith('/admin/ai-coder/history') %}active{% endif %}">
                <i class="fas fa-clock-rotate-left"></i> История
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-pill">
                <div class="user-avatar">AI</div>
                <div class="user-meta">
                    <div class="user-name">Пользователь</div>
                    <div class="user-id">{{ user_id or 'unknown' }}</div>
                </div>
            </div>
        </div>
    </aside>
    <main class="main">
        {% block content %}{% endblock %}
    </main>
</div>
<script>
    (function() {
        const uid = "{{ user_id or '' }}";
        if (uid) localStorage.setItem("kvg_ai_user_id", uid);
    })();
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
    });
</script>
</body>
</html>
