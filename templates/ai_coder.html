{% extends "layout.html" %}
{% block content %}
<div class="flex h-screen bg-zinc-950">
    <!-- Sidebar -->
    <div class="w-72 bg-zinc-900 border-r border-zinc-800 p-6 flex flex-col">
        <h1 class="text-3xl font-bold text-white mb-10">AI Coder</h1>
        <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 py-4 px-6 rounded-2xl text-lg font-medium mb-8">
            + Новый чат
        </button>
        <div class="text-zinc-400 text-sm mt-auto">
            User: {{ user_id[:12] }}...
        </div>
    </div>

    <!-- Chat Area -->
    <div class="flex-1 flex flex-col">
        <div class="h-16 border-b border-zinc-800 bg-zinc-900 flex items-center px-8 text-lg font-medium">
            Чат с AI Coder
        </div>
        
        <div class="flex-1 p-10 overflow-auto">
            <div class="max-w-2xl mx-auto text-center">
                <p class="text-2xl text-zinc-300">Привет! Чем могу помочь?</p>
                <p class="text-zinc-500 mt-4">Опиши задачу или загрузи проект</p>
            </div>
        </div>

        <div class="p-8 border-t border-zinc-800 bg-zinc-900">
            <form method="post" action="/admin/ai-coder/api" class="max-w-3xl mx-auto">
                <input type="hidden" name="user_id" value="{{ user_id }}">
                <textarea name="task" rows="5" 
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl p-6 text-lg focus:outline-none focus:border-blue-500"
                    placeholder="Например: исправь баги в router.py и оптимизируй..."></textarea>
                <button type="submit" class="mt-6 w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-3xl text-xl font-medium">
                    Отправить AI
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
