
                    </div>
                </div>
            </div>
        {% endif %}
    </div>
    <form class="chat-form" id="chatForm" enctype="multipart/form-data">
        <input type="hidden" name="user_id" id="user_id_input" value="{{ user_id or '' }}">
        <div class="input-area">
            <textarea name="task" rows="1" placeholder="Опиши задачу..." id="taskInput"></textarea>
            <div class="input-actions">
                <label class="file-attach-btn">
                    <i class="fas fa-paperclip"></i>
                    <input type="file" name="file" id="fileInput" style="display:none;">
                </label>
                <button type="submit" class="btn-send" id="submitBtn"><i class="fas fa-arrow-up"></i></button>
            </div>
        </div>
        <div class="file-preview" id="filePreview" style="display:none;">
            <span id="fileNames"></span>
            <button type="button" class="btn-remove-file" onclick="clearFiles()"><i class="fas fa-times"></i></button>
        </div>
        <div class="model-selector">
            <label for="modelSelect"><i class="fas fa-microchip"></i> Модель:</label>
            <select id="modelSelect" name="model">
                {% for m in available_models %}
                    <option value="{{ m }}" {% if m == selected_model %}selected{% endif %}>{{ m }}</option>
                {% endfor %}
                <option value="custom" {% if selected_model not in available_models %}selected{% endif %}>Своя модель</option>
            </select>
            <input type="text" id="customModelInput" name="custom_model" placeholder="Название модели" value="{{ custom_model or '' }}" style="display:{% if selected_model not in available_models %}inline-block{% else %}none{% endif %};">
        </div>
        <div class="form-actions" id="formActions">
            {% if download %}
                <a href="{{ download }}" class="btn btn-success download-link"><i class="fas fa-download"></i> Скачать ZIP</a>
            {% endif %}
        </div>
    </form>
</div>
<script>
const fileInput = document.getElementById('fileInput');
const filePreview = document.getElementById('filePreview');
const fileNames = document.getElementById('fileNames');
fileInput.onchange = () => {
    if (fileInput.files.length) { fileNames.textContent = fileInput.files[0].name; filePreview.style.display = 'flex'; }
    else filePreview.style.display = 'none';
};
function clearFiles() { fileInput.value = ''; filePreview.style.display = 'none'; }

const taskInput = document.getElementById('taskInput');
taskInput.oninput = () => { taskInput.style.height = 'auto'; taskInput.style.height = taskInput.scrollHeight + 'px'; };

window.copyCode = btn => {
    const pre = btn.closest('.message-body').querySelector('pre');
    navigator.clipboard.writeText(pre.textContent).then(() => {
        btn.innerHTML = '<i class="fas fa-check"></i> Скопировано';
        setTimeout(() => btn.innerHTML = '<i class="fas fa-copy"></i> Копировать', 2000);
    });
};

document.getElementById('modelSelect').onchange = e => {
    document.getElementById('customModelInput').style.display = e.target.value === 'custom' ? 'inline-block' : 'none';
};

const chatForm = document.getElementById('chatForm');
const chatWindow = document.getElementById('chatWindow');
const submitBtn = document.getElementById('submitBtn');
const formActions = document.getElementById('formActions');

function addMsg(role, content) {
    const d = document.createElement('div');
    d.className = `message message-${role}`;
    d.innerHTML = `<div class="message-avatar"><i class="fas fa-${role === 'user' ? 'user' : 'robot'}"></i></div>
        <div class="message-content"><div class="message-label">${role === 'user' ? 'Задача' : 'Ответ AI'}</div>
        <div class="message-body">${role === 'assistant' ? '<pre><code class="language-plaintext"></code></pre>' : ''}</div></div>`;
    if (role === 'assistant') d.querySelector('code').textContent = content;
    else d.querySelector('.message-body').textContent = content;
    chatWindow.appendChild(d);
    chatWindow.scrollTop = chatWindow.scrollHeight;
}

chatForm.onsubmit = async e => {
    e.preventDefault();
    const task = taskInput.value.trim();
    if (!task && !fileInput.files.length) return;
    const fd = new FormData();
    fd.append('task', task);
    fd.append('user_id', document.getElementById('user_id_input').value);
    if (fileInput.files.length) fd.append('file', fileInput.files[0]);
    fd.append('model', document.getElementById('modelSelect').value);
    if (document.getElementById('modelSelect').value === 'custom') fd.append('custom_model', document.getElementById('customModelInput').value);

    addMsg('user', task || '📎 Файл');
    taskInput.value = ''; clearFiles();
    submitBtn.disabled = true; submitBtn.innerHTML = '<span class="spinner"></span>';

    try {
        const r = await fetch('/admin/ai-coder/api', { method: 'POST', body: fd });
        const data = await r.json();
        if (data.result) {
            addMsg('assistant', data.result);
            if (data.download_url) {
                let a = formActions.querySelector('.download-link');
                if (!a) { a = document.createElement('a'); a.className = 'btn btn-success download-link'; formActions.appendChild(a); }
                a.href = data.download_url; a.innerHTML = '<i class="fas fa-download"></i> Скачать ZIP';
            }
        } else addMsg('system', '❌ ' + (data.error || 'Ошибка'));
    } catch (err) { addMsg('system', '❌ ' + err.message); }
    finally { submitBtn.disabled = false; submitBtn.innerHTML = '<i class="fas fa-arrow-up"></i>'; }
};

(function() {
    const uid = "{{ user_id or '' }}";
    if (uid) localStorage.setItem("kvg_ai_user_id", uid);
    const inp = document.getElementById('user_id_input');
    if (!inp.value && localStorage.getItem('kvg_ai_user_id')) inp.value = localStorage.getItem('kvg_ai_user_id');
})();
</script>
{% endblock %}
