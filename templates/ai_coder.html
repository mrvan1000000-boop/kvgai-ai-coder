{% extends "layout.html" %}
{% block content %}

<div class="card">
  <div class="card-title">AI‑Coder</div>

  <form method="post" enctype="multipart/form-data">
    <label>Задача</label>
    <textarea name="task">{{ task }}</textarea>

    <label>Файл</label>
    <input type="file" name="file">

    <label>ZIP проекта</label>
    <input type="file" name="zip">

    <input type="hidden" name="user_id" value="{{ user_id }}">

    <button class="button" type="submit">Отправить</button>
  </form>

  {% if result %}
  <hr style="border: none; border-top: 1px solid #1f1f22; margin: 20px 0;">
  <div class="card-title">Результат</div>
  <pre class="card-body">{{ result }}</pre>

  {% if download %}
  <a href="{{ download }}" class="button">Скачать ZIP</a>
  {% endif %}
  {% endif %}
</div>

{% endblock %}
