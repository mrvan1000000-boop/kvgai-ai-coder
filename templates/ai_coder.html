{% extends "layout.html" %}
{% block content %}
<div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-72 bg-zinc-900 border-r border-zinc-800 p-6 flex flex-col">
        <h1 class="text-2xl font-bold mb-8 text-white">AI Coder</h1>
        
        <button onclick="location.reload()" 
                class="bg-blue-600 hover:bg-blue-700 py-3 px-6 rounded-2xl font-medium mb-6">
            + Новый чат
        </button>

        <div class="text-sm text-zinc-400 mt-auto">
            User ID: {{ user_id[:12] }}...
        </div>
    </div>

    <!-- Main Area -->
    <div class="flex-1 flex flex-col">
        <div class="h-14 border-b border-zinc-800 bg-zinc-900 flex items-center px-8 font-medium">
            Чат с AI Coder
        </div>
        
        <div class="flex-1 p-8 overflow-auto">
            <div class="max-w-3xl mx-auto">
                <p class="text-zinc-400 text-lg">Привет! Опиши задачу или загрузи файл/ZIP проекта.</p>
            </div>
        </div>

        <div class="p-6 border-t border-zinc-800 bg-zinc-900">
            <form method="post" action="/admin/ai-coder/api" class="max-w-3xl mx-auto">
                <input type="hidden" name="user_id" value="{{ user_id }}">
                <textarea name="task" rows="4" 
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl p-6 text-white placeholder-zinc-500"
                    placeholder="Например: найди и исправь ошибки в router.py..."></textarea>
                <button type="submit" 
                    class="mt-4 bg-blue-600 hover:bg-blue-700 px-10 py-4 rounded-2xl text-lg font-medium w-full">
                    Отправить → 
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
