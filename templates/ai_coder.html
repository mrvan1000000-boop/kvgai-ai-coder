<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coder – исправление кода</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px; margin:0 auto;
            background: white; border-radius: 20px; padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color:#333; margin-bottom:30px; font-size:2.2em; text-align:center; }
        .form-group { margin-bottom:20px; }
        label { display:block; margin-bottom:8px; color:#555; font-weight:600; font-size:1.1em; }
        textarea, input[type="text"], select {
            width:100%; padding:12px; border:2px solid #e0e0e0; border-radius:10px;
            font-size:16px; transition:border-color 0.3s;
        }
        textarea:focus, input:focus, select:focus { outline:none; border-color:#667eea; }
        textarea { min-height:100px; resize:vertical; }
        input[type="file"] {
            padding:10px; background:#f5f5f5; border:2px dashed #ddd;
            border-radius:10px; width:100%; cursor:pointer;
        }
        button {
            background: linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            color:white; border:none; padding:14px 40px; font-size:1.1em;
            border-radius:10px; cursor:pointer; transition:transform 0.3s, box-shadow 0.3s;
            display:block; margin:20px auto 0; width:100%;
        }
        button:hover { transform:translateY(-2px); box-shadow:0 10px 25px rgba(102,126,234,0.4); }
        .user-id { background:#f0f0f0; padding:10px; border-radius:10px; margin-bottom:20px; font-size:0.9em; color:#666; word-break:break-all; }
        .result-container { margin-top:30px; border-top:2px solid #eee; padding-top:20px; }
        .result-container h2 { color:#333; margin-bottom:15px; }
        .result-text {
            background:#f8f9fa; border:1px solid #e9ecef; border-radius:10px; padding:20px;
            white-space:pre-wrap; font-family:'Courier New', monospace; font-size:14px; max-height:600px; overflow-y:auto;
        }
        .download-link {
            display:inline-block; margin-top:15px; padding:10px 25px;
            background:#28a745; color:white; text-decoration:none; border-radius:8px;
        }
        .download-link:hover { background:#218838; }
        .model-selector { display:flex; gap:20px; align-items:flex-start; }
        .model-selector > div { flex:1; }
        .spinner { display:none; margin:20px auto; width:50px; height:50px; border:4px solid #f3f3f3; border-top:4px solid #667eea; border-radius:50%; animation:spin 1s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <h1>🧠 AI Coder Agent</h1>
    <div class="user-id"><strong>User ID:</strong> {{ user_id }}</div>
    <form method="post" enctype="multipart/form-data" id="coderForm">
        <div class="form-group">
            <label for="task">📝 Задача (что нужно исправить):</label>
            <textarea name="task" id="task" placeholder="Опишите, что нужно исправить..." required>{{ task }}</textarea>
        </div>
        <div class="form-group">
            <label for="file">📁 Файл (необязательно):</label>
            <input type="file" name="file" id="file" accept=".py,.js,.html,.css,.txt,.zip,.rar">
        </div>
        <div class="model-selector">
            <div class="form-group">
                <label for="model">🤖 Модель:</label>
                <select name="model" id="model">
                    {% for m in available_models %}
                    <option value="{{ m }}" {% if m == selected_model %}selected{% endif %}>{{ m }}</option>
                    {% endfor %}
                    <option value="custom">Своя модель</option>
                </select>
            </div>
            <div class="form-group" id="customModelGroup" style="display:none;">
                <label for="custom_model">🔧 Своя модель:</label>
                <input type="text" name="custom_model" id="custom_model" placeholder="openrouter:model_name или groq:model_name">
            </div>
        </div>
        <input type="hidden" name="user_id" value="{{ user_id }}">
        <button type="submit">🚀 Запустить исправление</button>
    </form>
    <div class="spinner" id="spinner"></div>
    {% if result %}
    <div class="result-container">
        <h2>✅ Результат</h2>
        <div class="result-text">{{ result }}</div>
        {% if download %}
        <a href="{{ download }}" class="download-link">📥 Скачать исправленные файлы</a>
        {% endif %}
    </div>
    {% endif %}
</div>
<script>
    document.getElementById('model').addEventListener('change', function() {
        document.getElementById('customModelGroup').style.display = this.value === 'custom' ? 'block' : 'none';
    });
    document.getElementById('coderForm').addEventListener('submit', function() {
        document.getElementById('spinner').style.display = 'block';
    });
</script>
</body>
</html>
