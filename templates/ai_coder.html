{% extends "layout.html" %}
{% block content %}

<div class="chat-container">

    <!-- Окно сообщений -->
    <div class="messages" id="messages">
        {% for msg in history %}
            {% if msg.role == "user" %}
                <div class="bubble bubble-user">
                    <div class="bubble-text">{{ msg.content }}</div>
                </div>
            {% else %}
                <div class="bubble bubble-ai">
                    <div class="bubble-text">{{ msg.content }}</div>
                </div>
            {% endif %}
        {% endfor %}

        {% if result %}
            <div class="bubble bubble-user">
                <div class="bubble-text">{{ task }}</div>
            </div>

            <div class="bubble bubble-ai">
                <div class="bubble-text"><pre>{{ result }}</pre></div>
            </div>
        {% endif %}
    </div>

    <!-- Нижняя панель ввода -->
    <form class="input-bar" action="/admin/ai-coder" method="post" enctype="multipart/form-data">
        <input type="hidden" name="user_id" id="user_id_input" value="{{ user_id }}">

        <textarea name="task" class="input-text" placeholder="Напиши задачу..."></textarea>

        <div class="input-row">
            <input type="file" name="file">
            <input type="file" name="zip">

            <select name="model" class="model-select">
                <option value="google/gemma-4-26b-a4b-it:free">Gemma 4 26B Free</option>
                <option value="tencent/hy3:free">Hy3 Free</option>
                <option value="qwen/qwen3-coder:free">Qwen3 Coder Free</option>
            </select>

            <button class="btn-send">Отправить</button>
        </div>
    </form>

</div>

<script>
    // Автоскролл вниз
    const msgBox = document.getElementById("messages");
    msgBox.scrollTop = msgBox.scrollHeight;

    // Восстановление модели
    const select = document.querySelector(".model-select");
    const savedModel = localStorage.getItem("kvg_ai_model");
    if (savedModel) select.value = savedModel;
    select.addEventListener("change", () => {
        localStorage.setItem("kvg_ai_model", select.value);
    });

    // Восстановление user_id
    const stored = localStorage.getItem("kvg_ai_user_id");
    const input = document.getElementById("user_id_input");
    if (stored && input && (!input.value || input.value === "None")) {
        input.value = stored;
    }
</script>

{% endblock %}
