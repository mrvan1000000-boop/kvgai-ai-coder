<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coder - Управление задачами</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px; margin:0 auto;
            background: white; border-radius: 20px; padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color:#333; margin-bottom:20px; }
        .form-group { margin-bottom:15px; }
        label { display:block; margin-bottom:5px; color:#555; font-weight:600; }
        input, textarea {
            width:100%; padding:10px; border:2px solid #e0e0e0; border-radius:8px;
            font-size:14px; transition:border-color 0.3s;
        }
        input:focus, textarea:focus { outline:none; border-color:#667eea; }
        textarea { min-height:100px; resize:vertical; }
        button {
            background: linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            color:white; border:none; padding:12px 30px; font-size:1em;
            border-radius:8px; cursor:pointer; width:100%;
        }
        button:hover { transform:translateY(-2px); box-shadow:0 10px 25px rgba(102,126,234,0.4); }
        .result { margin-top:20px; padding:15px; background:#f5f5f5; border-radius:8px; }
        .nav {
            text-align:right; margin-bottom:20px;
        }
        .nav a {
            color:#667eea; text-decoration:none; margin-left:15px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="/admin/ai-coder">← Чат с AI</a>
    </div>
    <h1>📋 Управление задачами Git Agent</h1>
    <p style="margin-bottom:20px;color:#666;">
        Здесь можно создать задачу для <strong>git_agent.py</strong>, 
        который автоматически внесёт изменения в репозиторий на GitHub.
    </p>
    
    <form method="post">
        <div class="form-group">
            <label for="file_path">📁 Путь к файлу:</label>
            <input type="text" name="file_path" id="file_path" 
                   placeholder="ai_coder/router.py" required>
        </div>
        
        <div class="form-group">
            <label for="prompt">📝 Задача:</label>
            <textarea name="prompt" id="prompt" 
                      placeholder="исправь ошибки и оптимизируй код" required></textarea>
        </div>
        
        <button type="submit">🚀 Создать задачу</button>
    </form>
    
    {% if result %}
    <div class="result">
        {{ result|safe }}
    </div>
    {% endif %}
</div>
</body>
</html>
